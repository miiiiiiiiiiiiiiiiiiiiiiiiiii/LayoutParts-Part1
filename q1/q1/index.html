<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/style.css">
  <title>LayoutParts-Q1</title>
</head>

<body>
  <div class="wrapper">
    <h1 class="title">基本レイアウト・パーツ</h1>
    <h2 class="sub--title">Q1中央寄せ・横並び</h2>
    <h3 class="question--title">Q1-1 左右中央寄せ</h3>
    <!-- Q1-1の回答はここから -->
     <!-- text-align -->
    <div class="q1--horizontality text-align-box">
      <div class="white-box">
        <div class="label dark-box">text-align</div>
      </div>
    </div>

    <!-- margin -->
    <div class="q1--horizontality margin-box">
      <div class="white-box">
        <div class="label dark-box margin-label">margin</div>
      </div>
    </div>
    <!-- Q1-1の回答はここまで -->
    <h3 class="question--title">Q1-2 上下左右中央寄せ</h3>
    <!-- Q1-2の回答はここから -->
  
    <!-- table -->
     <div class="q1--perimeter table-box">
       <div class="table-inner">
        <div class="table-label">table</div>
      </div>
    </div>

    <!-- flex -->
    <div class="q1--perimeter flex-box">
      <div class="flex-inner">flex</div>
    </div>

    <!-- position -->
    <div class="q1--position">
      <div class="position-box">
        <div class="position-label dark-box">position</div>
      </div>
    </div>
    <!-- Q1-2の回答はここまで -->
  </div>
</body>

</html>
